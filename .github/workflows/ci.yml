name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (lint + unit + integração + contrato)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Instalar dependências
        working-directory: backend
        run: npm install
      - name: Lint (SAST)
        working-directory: backend
        run: npm run lint
      - name: Testes (unit + integração + contrato)
        working-directory: backend
        run: npm test

  frontend:
    name: Frontend (lint + testes + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Instalar dependências
        working-directory: frontend
        run: npm install
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Testes (unit + componentes)
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build
